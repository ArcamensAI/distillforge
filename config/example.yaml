server:
  listen_addr: "127.0.0.1:6188"
  metrics_addr: "127.0.0.1:6192"

teacher:
  name: "teacher"
  address: "127.0.0.1:9000"
  use_tls: false
  sni: ""
  host_header: "127.0.0.1:9000"
  input_cost_per_million_tokens_usd: 5.0
  output_cost_per_million_tokens_usd: 15.0

students:
  - name: "local_student"
    address: "127.0.0.1:9100"
    use_tls: false
    sni: ""
    host_header: "127.0.0.1:9100"
    input_cost_per_million_tokens_usd: 0.05
    output_cost_per_million_tokens_usd: 0.05

timeouts:
  upstream_connection_timeout_ms: 2000
  teacher_inference_timeout_ms: 30000
  student_inference_timeout_ms: 2000
  upstream_write_timeout_ms: 30000
  shadow_student_timeout_ms: 5000

logging:
  path: "data/logs/proxy.jsonl"
  feedback_path: "data/logs/feedback.jsonl"
  shadow_path: "data/logs/shadow.jsonl"
  mode: "redacted"
  max_capture_bytes: 65536

routing:
  default_missing_task_behavior: "teacher_fallback"
  snapshot_path: "config/routing_snapshot.json"

rate_limits:
  enabled: true
  window_ms: 60000
  default_requests_per_window: 120
  clients:
    crm_backend: 600
  tasks:
    email_classification_v1: 300
