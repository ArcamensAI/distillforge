<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="DistillForge concept: one proxy URL splits traffic between an expensive teacher model and a cheap distilled student model">
  <defs>
    <marker id="ah-green" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#00e676"/></marker>
    <marker id="ah-teal" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#00a8c6"/></marker>
    <marker id="ah-muted" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <style>
      .lbl{fill:#94a3b8;font-size:13px}
      .lbl-s{fill:#64748b;font-size:11px}
      .box-t{fill:#ffffff;font-size:16px;font-weight:700}
      .mono{font-family:'SF Mono',ui-monospace,'Courier New',monospace}
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1000" height="500" rx="18" fill="#0b1320"/>

  <!-- ============ YOUR APP ============ -->
  <rect x="34" y="205" width="158" height="92" rx="12" fill="#111c2e" stroke="#334155"/>
  <text x="113" y="244" text-anchor="middle" class="box-t">Your app</text>
  <text x="113" y="268" text-anchor="middle" class="lbl">OpenAI SDK,</text>
  <text x="113" y="285" text-anchor="middle" class="lbl">unchanged</text>

  <!-- app -> proxy -->
  <line x1="192" y1="251" x2="338" y2="251" stroke="#00e676" stroke-width="2.5" marker-end="url(#ah-green)"/>
  <text x="265" y="238" text-anchor="middle" class="lbl-s">swap 1 line</text>
  <text x="265" y="226" text-anchor="middle" class="mono" font-size="11" fill="#00e676">base_url →</text>

  <!-- ============ DISTILLFORGE PROXY ============ -->
  <rect x="345" y="120" width="262" height="262" rx="16" fill="#0f172a" stroke="#00e676" stroke-width="1.5"/>
  <!-- logomark -->
  <g transform="translate(372,138) scale(0.5)">
    <path d="M10,15 L35,15 L45,40 L35,65 L10,65 L20,40 Z" fill="#00e676"/>
    <path d="M80,15 L55,15 L45,40 L55,65 L80,65 L70,40 Z" fill="#00a8c6"/>
  </g>
  <text x="416" y="168" class="box-t" font-size="17">DistillForge proxy</text>
  <!-- url chip -->
  <rect x="368" y="186" width="216" height="30" rx="6" fill="#0b1320" stroke="#1e293b"/>
  <text x="476" y="206" text-anchor="middle" class="mono" font-size="10.5" fill="#cbd5e1">&lt;task&gt;.&lt;tenant&gt;.distillforge.cloud</text>

  <!-- router decision -->
  <text x="476" y="248" text-anchor="middle" class="lbl" font-size="13" fill="#e2e8f0">Inspects every request</text>
  <rect x="396" y="262" width="160" height="44" rx="10" fill="#111c2e" stroke="#334155"/>
  <text x="476" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#00e676">Router</text>
  <text x="476" y="298" text-anchor="middle" class="lbl-s">easy vs. hard?</text>

  <text x="476" y="338" text-anchor="middle" class="lbl-s">redacted logs · FinOps metrics</text>
  <text x="476" y="356" text-anchor="middle" class="lbl-s">shadow → canary → bandit · auto-rollback</text>

  <!-- proxy -> teacher (top) -->
  <path d="M607 200 C 680 180, 710 150, 768 150" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#ah-muted)"/>
  <text x="690" y="135" text-anchor="middle" class="lbl">hard / novel</text>
  <text x="690" y="151" text-anchor="middle" class="lbl-s">→ full quality</text>

  <!-- proxy -> student (bottom) -->
  <path d="M607 300 C 680 320, 710 350, 768 350" fill="none" stroke="#00e676" stroke-width="3" marker-end="url(#ah-green)"/>
  <text x="690" y="372" text-anchor="middle" class="lbl" fill="#00e676">easy / repetitive</text>
  <text x="690" y="388" text-anchor="middle" class="lbl-s">→ ~95% cheaper</text>

  <!-- ============ TEACHER ============ -->
  <rect x="770" y="104" width="200" height="96" rx="12" fill="#111c2e" stroke="#334155"/>
  <text x="870" y="138" text-anchor="middle" class="box-t">🧠 Teacher</text>
  <text x="870" y="160" text-anchor="middle" class="lbl">Big LLM · GPU API</text>
  <text x="870" y="182" text-anchor="middle" class="mono" font-size="12" fill="#94a3b8">~$5.00 / M tokens</text>

  <!-- ============ STUDENT ============ -->
  <rect x="770" y="300" width="200" height="96" rx="12" fill="#0d2a1e" stroke="#00e676"/>
  <text x="870" y="334" text-anchor="middle" class="box-t">⚡ Student</text>
  <text x="870" y="356" text-anchor="middle" class="lbl" fill="#00e676">Tiny model · CPU</text>
  <text x="870" y="378" text-anchor="middle" class="mono" font-size="12" fill="#00e676">~$0.05 / M tokens</text>

  <!-- distillation loop: teacher traffic trains student -->
  <path d="M870 200 C 925 235, 925 265, 870 300" fill="none" stroke="#00a8c6" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#ah-teal)"/>
  <text x="958" y="250" text-anchor="middle" class="lbl" fill="#00a8c6" transform="rotate(90 958 250)">distilled from teacher traffic</text>

  <!-- ============ RESULT BANNER ============ -->
  <rect x="345" y="424" width="625" height="50" rx="12" fill="#0d2330" stroke="#1e293b"/>
  <text x="657" y="455" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Same answers, same SDK — <tspan fill="#00e676">up to 95% off your LLM bill</tspan></text>

  <!-- step numbers -->
  <circle cx="265" cy="206" r="11" fill="#00e676"/><text x="265" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#04140a">1</text>
  <circle cx="476" cy="106" r="11" fill="#00e676"/><text x="476" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#04140a">2</text>
  <circle cx="690" cy="404" r="11" fill="#00e676"/><text x="690" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#04140a">3</text>
</svg>
