server:
  listen_addr: "127.0.0.1:6188"
  metrics_addr: "127.0.0.1:6192"

teacher:
  name: "qwen3_8b_master"
  address: "127.0.0.1:9400"
  use_tls: false
  sni: ""
  host_header: "127.0.0.1:9400"
  input_cost_per_million_tokens_usd: 0.0
  output_cost_per_million_tokens_usd: 0.0

students:
  - name: "qwen2_5_1_5b_student"
    address: "127.0.0.1:9500"
    use_tls: false
    sni: ""
    host_header: "127.0.0.1:9500"
    input_cost_per_million_tokens_usd: 0.0
    output_cost_per_million_tokens_usd: 0.0

timeouts:
  upstream_connection_timeout_ms: 2000
  teacher_inference_timeout_ms: 120000
  student_inference_timeout_ms: 120000
  upstream_write_timeout_ms: 120000
  shadow_student_timeout_ms: 120000

logging:
  path: "examples/groq_banking77/data_local_llm/logs/proxy.jsonl"
  feedback_path: "examples/groq_banking77/data_local_llm/logs/feedback.jsonl"
  shadow_path: "examples/groq_banking77/data_local_llm/logs/shadow.jsonl"
  mode: "redacted"
  max_capture_bytes: 65536

routing:
  default_missing_task_behavior: "teacher_fallback"
  snapshot_path: "examples/groq_banking77/routing_snapshot.local_llm.json"

rate_limits:
  enabled: false
  window_ms: 60000
  default_requests_per_window: null
